name: finex-loan-service
project: mintyn-project
namespace: sandbox
values: |-
  fullnameOverride: finex-loan-service
  image: 
    repository: mintfintech/finex-loan-service:app-67
  namespace: sandbox
  containerPort: 9090
  autoscaling:
    enabled: false
  role:
    enabled: true
  ingress:
    host: finex-loan-service-staging
    domain: mintfintech.com
  resources:
    requests:
      memory: "600Mi"
      cpu: "50m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
  lProbe:
    enabled: true
    path: /actuator/health
    failureThreshold: 5
    periodSeconds: 10
    initialDelaySeconds: 60
  rProbe:
    enabled: true
    path: /actuator/health
    failureThreshold: 5
    periodSeconds: 10
    initialDelaySeconds: 60
  env:
    - name: KUBERNETES_NAMESPACE
      value: sandbox
    - name: SPRING_PROFILES_ACTIVE
      value: sandbox
    - name: DB_NAME
      value: finex_loan_db
    - name: KAFKA_BOOTSTRAP_SERVERS
      valueFrom:
        configMapKeyRef:
          name: configs
          key: KAFKA_HOST
    - name: DB_USERNAME
      valueFrom:
        configMapKeyRef:
          name: configs
          key: DATABASE_USERNAME
    - name: DB_PASSWORD
      valueFrom:
        configMapKeyRef:
          name: configs
          key: DATABASE_PASSWORD
    - name: DB_URL
      valueFrom:
        configMapKeyRef:
          name: configs
          key: DATABASE_URL
    - name: FINTELLIA_CLIENT_ID
      valueFrom:
        configMapKeyRef:
          name: configs
          key: FINTELLIA_CLIENT_ID
    - name: FINTELLIA_CLIENT_SECRET
      valueFrom:
        configMapKeyRef:
          name: configs
          key: FINTELLIA_CLIENT_SECRET
  volumeMounts:
    - name: config
      mountPath: "/config"
      readOnly: true
  volumes:
    - name: config
      configMap:
        name: account-service
