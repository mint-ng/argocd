name: marketplace-webapp
project: mintyn-project
namespace: production
values: |-
  fullnameOverride: marketplace-webapp
  image: 
    repository: mintfintech/marketplace-webapp:prod-app-7
  namespace: production
  containerPort: 3000
  autoscaling:
    enabled: false
  role:
    enabled: true
  ingress:
    host: marketplace
    domain: mintyn.com
  resources:
    requests:
      memory: "100Mi"
      cpu: "50m"
    limits:
      memory: "250Mi"
      cpu: "150m"
  lProbe:
    enabled: true
    path: /
    failureThreshold: 5
    periodSeconds: 5
    initialDelaySeconds: 10
  rProbe:
    enabled: false
    path: /
    failureThreshold: 5
    periodSeconds: 5
    initialDelaySeconds: 10
